<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings UI Mockup</title>
  <style>
    :root {
      --bg1: #172235;
      --bg2: #24324a;
      --panel: #2a3240;
      --panel-border: rgba(255,255,255,0.10);
      --card: #313949;
      --card-border: rgba(255,255,255,0.08);
      --input: #2b3341;
      --input-border: rgba(255,255,255,0.14);
      --text: #f2f4f8;
      --muted: #c0c6d2;
      --green: #59c64a;
      --green-dark: #45b03a;
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 24%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.03), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 24px;
    }

    .window {
      width: 830px;
      border-radius: 28px;
      background: #252c38;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      padding: 28px 26px 30px;
    }

    .titlebar {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 0 18px;
    }

    .titlebar h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      font-weight: 750;
      letter-spacing: 0.2px;
    }

    .close-btn {
      position: absolute;
      right: 0;
      top: 0;
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: #eef2f8;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.9;
    }

    .stack {
      display: grid;
      gap: 18px;
      margin-top: 6px;
    }

    .card {
      background: linear-gradient(180deg, #303847, #2d3543);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 22px 26px;
      display: grid;
      grid-template-columns: 72px 1fr 390px;
      gap: 20px;
      align-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.72);
      font-size: 25px;
      font-weight: 700;
    }

    .icon.plain {
      border-radius: 14px;
      border: none;
      width: 56px;
      height: 56px;
      font-size: 36px;
      background: transparent;
      color: rgba(255,255,255,0.72);
    }

    .label {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.1px;
    }

    .field, .select, .token-field {
      width: 100%;
      height: 70px;
      border-radius: 16px;
      border: 1px solid var(--input-border);
      background: linear-gradient(180deg, #2c3442, #2a313f);
      color: var(--text);
      padding: 0 24px;
      font-size: 26px;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.04);
    }

    .currency-wrap {
      display: grid;
      grid-template-columns: 1fr 56px 1fr 36px;
      gap: 12px;
      align-items: center;
    }

    .swap {
      text-align: center;
      font-size: 34px;
      color: rgba(255,255,255,0.76);
    }

    .chev {
      margin-left: -18px;
      pointer-events: none;
      color: rgba(255,255,255,0.75);
      font-size: 22px;
      justify-self: end;
    }

    .subtext {
      grid-column: 3;
      margin-top: -8px;
      color: rgba(255,255,255,0.68);
      font-size: 18px;
    }

    .options-card {
      align-items: start;
    }

    .options-wrap {
      grid-column: 2 / 4;
      display: grid;
      gap: 18px;
      margin-top: 2px;
    }

    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 40px;
    }

    .option-label {
      font-size: 26px;
      color: var(--text);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 92px;
      height: 48px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #363e4b;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      transition: .2s ease;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.18);
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 36px;
      height: 36px;
      left: 5px;
      top: 5px;
      background: #eaeef5;
      border-radius: 50%;
      transition: .2s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.25);
    }

    .switch input:checked + .slider {
      background: linear-gradient(180deg, var(--green), var(--green-dark));
      border-color: transparent;
    }

    .switch input:checked + .slider:before {
      transform: translateX(42px);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 20px;
    }

    .btn {
      min-width: 190px;
      height: 66px;
      padding: 0 28px;
      border-radius: 999px;
      font-size: 28px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--text);
      background: linear-gradient(180deg, #313948, #2b3341);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .btn.primary {
      background: linear-gradient(180deg, var(--green), var(--green-dark));
      border-color: transparent;
      min-width: 190px;
    }

    @media (max-width: 900px) {
      .window { width: min(100%, 830px); }
      .card {
        grid-template-columns: 56px 1fr;
      }
      .label, .control, .subtext { grid-column: 2; }
      .control { width: 100%; }
      .subtext { margin-top: 8px; }
      .options-wrap { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <h1>Settings</h1>
      <button class="close-btn" aria-label="Close">×</button>
    </div>

    <div class="stack">
      <section class="card">
        <div class="icon">$¥</div>
        <div class="label">Currency Pair</div>
        <div class="control currency-wrap">
          <input class="field" value="JPY" />
          <div class="swap">↔</div>
          <input class="field" value="CNY" />
          <div class="chev">⌄</div>
        </div>
      </section>

      <section class="card">
        <div class="icon plain">🪙</div>
        <div class="label">Base Amount</div>
        <div class="control">
          <input class="field" value="10,000" />
        </div>
        <div class="subtext">Seconds</div>
      </section>

      <section class="card">
        <div class="icon plain">◔</div>
        <div class="label">Refresh Interval</div>
        <div class="control">
          <input class="field" value="60" />
        </div>
        <div class="subtext">Seconds</div>
      </section>

      <section class="card">
        <div class="icon plain">🗝</div>
        <div class="label">Wise API Token</div>
        <div class="control">
          <input class="token-field" value="a26f************************5bed" />
        </div>
        <div class="subtext">Paste to replace, or clear to remove.</div>
      </section>

      <section class="card options-card">
        <div class="icon plain">⚙</div>
        <div class="label">Options</div>
        <div class="options-wrap">
          <div class="option-row">
            <div class="option-label">Lock widget position</div>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
          <div class="option-row">
            <div class="option-label">Launch at startup</div>
            <label class="switch">
              <input type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </section>
    </div>

    <div class="actions">
      <button class="btn">Cancel</button>
      <button class="btn primary">Save</button>
    </div>
  </div>
</body>
</html>
